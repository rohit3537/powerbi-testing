# DAX Measure Test Suite — Template
# Copy this file and customize for your project.
#
# Run with:
#   uvx --python 3.12 --with pyadomd --with pyyaml python -m dax_test.runner tests/my_tests.yaml

project: My Project Name
# Optional: path to .SemanticModel folder (for auto-discovery)
# model_path: "./ProjectFolder/MyReport.SemanticModel"

defaults:
  tolerance: 0.01        # absolute tolerance for numeric comparisons
  # tolerance_pct: 0.001 # relative tolerance (0.1%)

